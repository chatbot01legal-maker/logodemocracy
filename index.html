<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Logodemocracy — Cognitive System</title>

  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #020617;
      color: white;
    }

    #cy {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 1;
    }

    #panel {
      position: fixed;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background: rgba(17, 24, 39, 0.85);
      padding: 20px;
      z-index: 2;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<div id="cy"></div>

<div id="panel">
  <h2 id="title">Selecciona un nodo</h2>
  <p id="content"></p>
</div>

<script>
const cy = cytoscape({
  container: document.getElementById("cy"),

  elements: [
    { data: { id: "a", label: "Nodo prueba" } },
    { data: { id: "b", label: "Otro nodo" } },
    { data: { source: "a", target: "b" } }
  ],

  style: [
    {
      selector: "node",
      style: {
        "background-color": "#22c55e",
        label: "data(label)",
        color: "#fff"
      }
    },
    {
      selector: "edge",
      style: {
        "line-color": "#888"
      }
    }
  ],

  layout: { name: "grid" }
});
</script>

</body>
</html>
