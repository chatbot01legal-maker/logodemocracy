<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Logodemocracy — Cognitive System</title>

  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    #cy {
      width: 100%;
      height: 100vh;
    }

    #panel {
      position: absolute;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background: #111827;
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #333;
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<div id="cy"></div>

<div id="panel">
  <h2 id="title">Selecciona un nodo</h2>
  <p id="content"></p>
</div>

<script src="app.js"></script>

</body>
</html>
