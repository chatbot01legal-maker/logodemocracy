<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Logodemocracy — Cognitive System</title>

  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #020617;
    }

    #cy {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="cy"></div>

<script>
const cy = cytoscape({
  container: document.getElementById("cy"),

  elements: [
    { data: { id: "a", label: "Nodo prueba" } },
    { data: { id: "b", label: "Otro nodo" } },
    { data: { source: "a", target: "b" } }
  ],

  style: [
    {
      selector: "node",
      style: {
        "background-color": "#22c55e",
        label: "data(label)",
        color: "#fff"
      }
    },
    {
      selector: "edge",
      style: {
        "line-color": "#888"
      }
    }
  ],

  layout: {
    name: "grid"
  }
});

// interaccion mínima
cy.on("tap", "node", (evt) => {
  const node = evt.target;
  alert("Click en: " + node.data("label"));
});
</script>

</body>
</html>lo
