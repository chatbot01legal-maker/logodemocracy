<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Logodemocracy — Cognitive System</title>

  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #020617;
    }

    #cy {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="cy"></div>

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
<script src="script.js"></script>

// interaccion mínima
cy.on("tap", "node", (evt) => {
  const node = evt.target;
  alert("Click en: " + node.data("label"));
});
</script>

</body>
</html>lo
